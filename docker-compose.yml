services:
  db:
    image: postgres:16
    container_name: portal_tiltil_db
    environment:
      POSTGRES_USER: tiltil
      POSTGRES_PASSWORD: tiltil_dev
      POSTGRES_DB: portal_instalacion
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiltil -d portal_instalacion"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: portal_tiltil_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://tiltil:tiltil_dev@db:5432/portal_instalacion
      DATABASE_URL_SYNC: postgresql+psycopg2://tiltil:tiltil_dev@db:5432/portal_instalacion
      JWT_SECRET: dev-secret-change-me-in-prod
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 480
      CORS_ORIGINS: '["http://localhost:3000"]'
      UPLOADS_DIR: /app/uploads
      MAX_UPLOAD_MB: "20"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_TLS: "true"
      SMTP_FROM: "no-reply@electricatiltil.cl"
      SMTP_FROM_NAME: "Electrica TilTil"
      ADMIN_NOTIFY_EMAIL: "admin@tiltil.cl"
      PORTAL_PUBLIC_URL: "http://localhost:3000"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - tiltil_uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      args:
        # Estas vars se inlinean en el bundle del cliente durante `next build`.
        # Si las cambias hay que rebuild: `docker compose build frontend`.
        NEXT_PUBLIC_BASE_PATH: "/portaltiltil"
        NEXT_PUBLIC_API_URL: ""
    container_name: portal_tiltil_frontend
    environment:
      # Solo se usa server-side (route handlers, server components).
      API_URL_INTERNAL: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  tiltil_uploads:

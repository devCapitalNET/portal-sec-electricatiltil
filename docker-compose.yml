services:
  db:
    image: postgres:16
    container_name: portal_tiltil_db
    environment:
      POSTGRES_USER: tiltil
      POSTGRES_PASSWORD: tiltil_dev
      POSTGRES_DB: portal_instalacion
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiltil -d portal_instalacion"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: portal_tiltil_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://tiltil:tiltil_dev@db:5432/portal_instalacion
      DATABASE_URL_SYNC: postgresql+psycopg2://tiltil:tiltil_dev@db:5432/portal_instalacion
      JWT_SECRET: dev-secret-change-me-in-prod
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 480
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    container_name: portal_tiltil_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
      API_URL_INTERNAL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: pnpm dev

volumes:
  pgdata:

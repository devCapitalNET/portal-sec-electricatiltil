services:
  db:
    image: postgres:16
    container_name: portal_tiltil_db
    environment:
      POSTGRES_USER: tiltil
      POSTGRES_PASSWORD: tiltil_dev
      POSTGRES_DB: portal_instalacion
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiltil -d portal_instalacion"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: portal_tiltil_backend
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - tiltil_uploads:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      args:
        # Vars NEXT_PUBLIC_* se inlinean en el bundle del cliente durante
        # `next build`. Se leen del .env de la raiz del proyecto (que
        # docker compose usa para sustitucion ${VAR}). Si las cambias hay
        # que rebuild: `docker compose build frontend`.
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: portal_tiltil_frontend
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  tiltil_uploads:
